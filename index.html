<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standard Calculator</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- External CSS -->
<link rel="stylesheet" href="standardcalcu.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

<div class="calculator">

    <!-- Display -->
    <div class="display-container">
        <!-- Formula / history -->
        <div id="formula" style="text-align:right; font-size:18px; color:#666; min-height:24px;"></div>
        <!-- Main display -->
        <input type="text" id="display" value="0" readonly>
    </div>

    <!-- Buttons -->
    <div class="container-fluid">
        <div class="row g-2">
            <!-- Numbers -->
            <div class="col-3"><button class="btn calc-btn" onclick="append('7')">7</button></div>
            <div class="col-3"><button class="btn calc-btn" onclick="append('8')">8</button></div>
            <div class="col-3"><button class="btn calc-btn" onclick="append('9')">9</button></div>
            <div class="col-3"><button class="btn calc-btn operator" onclick="setOperator('/')">÷</button></div>

            <div class="col-3"><button class="btn calc-btn" onclick="append('4')">4</button></div>
            <div class="col-3"><button class="btn calc-btn" onclick="append('5')">5</button></div>
            <div class="col-3"><button class="btn calc-btn" onclick="append('6')">6</button></div>
            <div class="col-3"><button class="btn calc-btn operator" onclick="setOperator('*')">×</button></div>

            <div class="col-3"><button class="btn calc-btn" onclick="append('1')">1</button></div>
            <div class="col-3"><button class="btn calc-btn" onclick="append('2')">2</button></div>
            <div class="col-3"><button class="btn calc-btn" onclick="append('3')">3</button></div>
            <div class="col-3"><button class="btn calc-btn operator" onclick="setOperator('-')">−</button></div>

            <div class="col-3"><button class="btn calc-btn" onclick="append('0')">0</button></div>
            <div class="col-3"><button class="btn calc-btn" onclick="clearAll()">C</button></div>
            <div class="col-3"><button class="btn equal-btn" onclick="calculate()">=</button></div>
            <div class="col-3"><button class="btn calc-btn operator" onclick="setOperator('+')">+</button></div>

            <!-- Buttons A & B -->
            <div class="col-6">
                <button class="btn btn-secondary w-100 mt-2" data-bs-toggle="modal" data-bs-target="#developerModal">A</button>
            </div>

            <div class="col-6">
                <button class="btn btn-dark w-100 mt-2" data-bs-toggle="modal" data-bs-target="#applicationModal">B</button>
            </div>
        </div>
    </div>

</div>
</div>

<!-- Developer Modal -->
<div class="modal fade" id="developerModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">About the Developer</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Developer: Jean May D. Cuezon <br>
        Course: IT-214 Specialization 1
      </div>

    </div>
  </div>
</div>

<!-- Application Modal -->
<div class="modal fade" id="applicationModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">About the Application</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Application:  Standard Calculator supporting the four basic operations: <br>
        addition (+), subtraction (−)<br>
       multiplication (×), and division (÷).  
      </div>

    </div>
  </div>
</div>

<!-- JS -->
<script src="standardcalcu.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
